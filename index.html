<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>중국어 단어장 카드</title>
  <style>
    :root{
      --bg1:#eef2ff;
      --bg2:#fdf2f8;
      --bg3:#ecfeff;
      --card:rgba(255,255,255,.82);
      --cardBorder:rgba(255,255,255,.55);
      --text:#111827;
      --muted:#6b7280;
      --shadow:0 20px 60px rgba(15,23,42,.14);
      --radius:28px;

      --accent:#ef4444;

      --btn:#111827;
      --btnText:#ffffff;
      --btn2:rgba(255,255,255,.78);
      --btn2Text:#111827;
      --danger:#ef4444;
    }

    *{ box-sizing:border-box; }

    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR","Apple SD Gothic Neo",sans-serif;
      min-height:100vh;
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
      position:relative;
      overflow:hidden;
      background:
        radial-gradient(circle at 10% 15%, rgba(199,210,254,.95) 0%, transparent 28%),
        radial-gradient(circle at 88% 18%, rgba(251,207,232,.95) 0%, transparent 25%),
        radial-gradient(circle at 82% 86%, rgba(165,243,252,.95) 0%, transparent 24%),
        radial-gradient(circle at 20% 85%, rgba(254,240,138,.55) 0%, transparent 20%),
        linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 45%, var(--bg3) 100%);
    }

    body::before,
    body::after{
      content:"";
      position:absolute;
      border-radius:999px;
      filter:blur(24px);
      opacity:.55;
      pointer-events:none;
      z-index:0;
    }

    body::before{
      width:340px;
      height:340px;
      left:20px;
      top:20px;
      background:rgba(255,255,255,.35);
    }

    body::after{
      width:360px;
      height:360px;
      right:20px;
      bottom:10px;
      background:rgba(255,255,255,.25);
    }

    .app{
      width:min(1080px,100%);
      display:grid;
      gap:16px;
      position:relative;
      z-index:1;
    }

    .topbar{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:12px;
      flex-wrap:wrap;
    }

    .title{
      font-size:18px;
      font-weight:900;
      letter-spacing:-.2px;
    }

    .meta{
      color:var(--muted);
      font-size:13px;
      font-weight:700;
      margin-top:4px;
    }

    .rightBox{
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:flex-end;
      min-width:320px;
    }

    .controls{
      display:flex;
      gap:10px;
      justify-content:center;
      flex-wrap:wrap;
    }

    button{
      border:0;
      border-radius:16px;
      padding:12px 16px;
      font-weight:900;
      cursor:pointer;
      user-select:none;
      transition:.18s ease;
      box-shadow:0 10px 24px rgba(17,24,39,.08);
      font-size:15px;
    }

    button:hover{ transform:translateY(-1px); }
    button:active{ transform:translateY(0); }

    .primary{
      background:var(--btn);
      color:var(--btnText);
    }

    .secondary{
      background:var(--btn2);
      color:var(--btn2Text);
      backdrop-filter: blur(10px);
    }

    .danger{
      background:var(--danger);
      color:white;
    }

    .navBig{
      padding:18px 28px;
      border-radius:18px;
      font-size:20px;
      letter-spacing:.2px;
      min-width:96px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--cardBorder);
      backdrop-filter: blur(14px);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:38px;
      display:grid;
      gap:18px;
      position:relative;
      overflow:hidden;
      width:100%;
    }

    .posLine{
      text-align:center;
      color:var(--muted);
      font-size:14px;
      font-weight:800;
      margin-top:-4px;
    }

    .hanzi{
      font-size:96px;
      line-height:1.04;
      text-align:center;
      font-weight:900;
      letter-spacing:1px;
      padding:6px 10px;
      color:#0f172a;
    }

    .row{
      display:flex;
      gap:12px;
      justify-content:center;
      align-items:stretch;
      flex-wrap:wrap;
      padding-top:4px;
      width:100%;
    }

    .pill{
      border-radius:20px;
      padding:16px 18px;
      background:rgba(255,255,255,.72);
      border:2px solid rgba(239,68,68,.92);
      min-width:250px;
      max-width:100%;
      box-shadow:0 10px 24px rgba(239,68,68,.08);
      width:100%;
    }

    .label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:6px;
      font-weight:900;
      letter-spacing:.2px;
    }

    .pinyin{
      font-style:normal;
      color:#4b5563;
      font-size:20px;
      font-weight:800;
      letter-spacing:.2px;
      overflow-wrap:anywhere;
      word-break:break-word;
    }

    .korean{
      font-size:21px;
      font-weight:900;
      color:#111827;
      overflow-wrap:anywhere;
      word-break:keep-all;
    }

    .exampleText{
      font-size:28px;
      line-height:2;
      font-weight:800;
      color:#111827;
      white-space:normal;
      word-break:break-all;
      overflow-wrap:anywhere;
      max-width:100%;
      width:100%;
      display:block;
    }

    #exampleWrap{
      display:none;
      padding:26px 24px;
      max-width:100%;
      width:100%;
      overflow:hidden;
    }

    .panel{
      background:rgba(255,255,255,.60);
      border:1px solid rgba(255,255,255,.55);
      border-radius:20px;
      padding:14px;
      box-shadow:0 10px 28px rgba(0,0,0,.06);
      backdrop-filter: blur(10px);
    }

    textarea{
      width:100%;
      min-height:170px;
      border-radius:14px;
      border:1px solid #e5e7eb;
      padding:12px;
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,"Liberation Mono",monospace;
      font-size:13px;
      resize:vertical;
      outline:none;
      background:white;
    }

    .panelRow{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      align-items:center;
      justify-content:space-between;
      margin-bottom:10px;
    }

    .hint{
      color:var(--muted);
      font-size:13px;
      margin-top:8px;
      line-height:1.6;
    }

    .kbd{
      font-family:ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace;
      background:#111827;
      color:white;
      border-radius:8px;
      padding:2px 7px;
      font-size:12px;
    }

    .footerHint{
      text-align:center;
      color:var(--muted);
      font-size:12px;
      font-weight:700;
    }

    @media (max-width:720px){
      .rightBox{
        align-items:flex-start;
        min-width:unset;
        width:100%;
      }

      .card{
        padding:28px;
      }

      .hanzi{
        font-size:76px;
      }

      .pill{
        min-width:100%;
      }

      .pinyin,
      .korean{
        font-size:19px;
      }

      .exampleText{
        font-size:22px;
        line-height:1.8;
        word-break:break-all;
        overflow-wrap:anywhere;
      }

      #exampleWrap{
        padding:20px 18px;
      }

      .navBig{
        padding:16px 24px;
        font-size:18px;
        min-width:88px;
      }
    }

    @media (max-width:560px){
      body{
        padding:14px;
      }

      .hanzi{
        font-size:64px;
      }

      .exampleText{
        font-size:20px;
        line-height:1.75;
      }

      .korean{
        font-size:18px;
      }

      .pinyin{
        font-size:18px;
      }

      .navBig{
        padding:15px 22px;
        font-size:18px;
        min-width:84px;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <div class="title">중국어 단어장 카드</div>
        <div class="meta" id="meta"></div>
      </div>

      <div class="rightBox">
        <div class="controls">
          <button class="secondary" id="speak">🔊 듣기</button>
          <button class="secondary" id="random">🎲 랜덤</button>
          <button class="secondary navBig" id="prev">이전</button>
          <button class="primary navBig" id="next">다음</button>
        </div>
      </div>
    </div>

    <div class="card" aria-live="polite" id="card">
      <div class="posLine" id="pos"></div>
      <div class="hanzi" id="hanzi">—</div>

      <div class="row">
        <div class="pill" style="max-width:420px;">
          <div class="label">병음</div>
          <div class="pinyin" id="pinyin">—</div>
        </div>

        <div class="pill" style="max-width:420px;">
          <div class="label">한국어</div>
          <div class="korean" id="korean">—</div>
        </div>
      </div>

      <div class="pill" id="exampleWrap">
        <div class="label">예문</div>
        <div class="exampleText" id="example">—</div>
      </div>
    </div>

    <div class="panel">
      <div class="panelRow">
        <div style="font-weight:900;">데이터 붙여넣기</div>
        <div class="controls">
          <button class="secondary" id="reloadCsv">📥 CSV 새로고침</button>
          <button class="primary" id="load">불러오기</button>
          <button class="danger" id="clear">초기화</button>
        </div>
      </div>

      <textarea id="input" placeholder="쉼표(CSV) 또는 공백 형식 그대로 붙여넣기
예)
地铁,dìtiě,지하철/전철,명사
复习,Fùxí,복습하다,동사,为了提高汉语水平，我每天晚上都会复习。"></textarea>

      <div class="hint">
        지원 형식<br/>
        1) <b>한자,병음,한국어,품사(선택),예문(선택)</b><br/>
        2) <b>한자 병음 한국어 품사</b> (공백 구분)<br/>
        단축키:
        <span class="kbd">←</span> 이전 /
        <span class="kbd">→</span> 다음 /
        <span class="kbd">R</span> 랜덤 /
        <span class="kbd">S</span> 듣기
      </div>
    </div>

    <div class="footerHint">※ 입력칸은 이 브라우저에 자동 저장돼. (localStorage)</div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);

  const INPUT_KEY = "vocab_cards_input_v6";
  const UI_KEY    = "vocab_cards_ui_v6";
  const DEFAULT_CSV_FILE = "vocab.csv";

  let cards = [];
  let idx = 0;

  function parseCsvLine(line) {
    const result = [];
    let current = "";
    let inQuotes = false;

    for (let i = 0; i < line.length; i++) {
      const ch = line[i];

      if (ch === '"') {
        if (inQuotes && line[i + 1] === '"') {
          current += '"';
          i++;
        } else {
          inQuotes = !inQuotes;
        }
      } else if (ch === "," && !inQuotes) {
        result.push(current.trim());
        current = "";
      } else {
        current += ch;
      }
    }

    result.push(current.trim());
    return result;
  }

  function parseLines(text) {
    const lines = text
      .split(/\r?\n/)
      .map(l => l.trim())
      .filter(Boolean);

    const parsed = [];

    for (const line of lines) {
      if (line.includes(",")) {
        const parts = parseCsvLine(line);
        if (parts.length < 3) continue;

        const hanzi   = parts[0] || "";
        const pinyin  = parts[1] || "";
        const korean  = parts[2] || "";
        const pos     = parts[3] || "";
        const example = parts.slice(4).join(",").trim();

        if (!hanzi || !pinyin || !korean) continue;
        parsed.push({ hanzi, pinyin, korean, pos, example });
        continue;
      }

      const tokens = line.split(/\s+/);
      if (tokens.length < 3) continue;

      const hanzi = tokens[0];

      let firstKoIdx = -1;
      for (let i = 1; i < tokens.length; i++) {
        if (/[가-힣]/.test(tokens[i])) {
          firstKoIdx = i;
          break;
        }
      }
      if (firstKoIdx === -1) continue;

      const maybePos = tokens[tokens.length - 1];
      const hasPos = /명사|동사|형용사|부사|대명사|수사|조사|관형사|감탄사|구어|표현|문법/i.test(maybePos);

      const pinyin = tokens.slice(1, firstKoIdx).join(" ");
      const korean = tokens.slice(firstKoIdx, hasPos ? tokens.length - 1 : tokens.length).join(" ");
      const pos = hasPos ? maybePos : "";

      if (!hanzi || !pinyin || !korean) continue;
      parsed.push({ hanzi, pinyin, korean, pos, example: "" });
    }

    return parsed;
  }

  function saveUI() {
    localStorage.setItem(INPUT_KEY, $("input").value);
    localStorage.setItem(UI_KEY, JSON.stringify({ idx }));
  }

  function loadSavedUI() {
    const savedText = localStorage.getItem(INPUT_KEY);
    if (savedText !== null) $("input").value = savedText;

    const savedUI = localStorage.getItem(UI_KEY);
    if (savedUI) {
      try {
        const u = JSON.parse(savedUI);
        if (Number.isFinite(u.idx)) idx = u.idx;
      } catch(e) {}
    }
  }

  function clampIndex() {
    if (cards.length === 0) {
      idx = 0;
      return;
    }
    if (idx < 0) idx = 0;
    if (idx >= cards.length) idx = cards.length - 1;
  }

  function render(metaPrefix = "") {
    clampIndex();

    if (cards.length === 0) {
      $("hanzi").textContent = "데이터 없음";
      $("pinyin").textContent = "—";
      $("korean").textContent = "—";
      $("example").textContent = "—";
      $("exampleWrap").style.display = "none";
      $("pos").textContent = "";
      $("meta").textContent = metaPrefix || "vocab.csv 자동 로드 중… 또는 아래에 데이터를 넣고 ‘불러오기’를 눌러줘!";
      return;
    }

    const c = cards[idx];

    $("hanzi").textContent = c.hanzi || "—";
    $("pinyin").textContent = c.pinyin || "—";
    $("pos").textContent = c.pos ? c.pos : "";
    $("korean").textContent = c.korean || "—";

    const ex = $("example");
    const exWrap = $("exampleWrap");
    ex.textContent = c.example || "—";
    exWrap.style.display = c.example ? "block" : "none";

    $("meta").textContent = `${metaPrefix}${idx + 1} / ${cards.length}` + (c.pos ? ` · ${c.pos}` : "");
  }

  function next() {
    if (cards.length === 0) return;
    idx = (idx + 1) % cards.length;
    render("CSV · ");
    saveUI();
  }

  function prev() {
    if (cards.length === 0) return;
    idx = (idx - 1 + cards.length) % cards.length;
    render("CSV · ");
    saveUI();
  }

  function randomPick() {
    if (cards.length === 0) return;
    if (cards.length === 1) {
      idx = 0;
      render("CSV · ");
      saveUI();
      return;
    }
    let r;
    do {
      r = Math.floor(Math.random() * cards.length);
    } while (r === idx);
    idx = r;
    render("CSV · ");
    saveUI();
  }

  function getPreferredVoice() {
    if (!("speechSynthesis" in window)) return null;
    const voices = window.speechSynthesis.getVoices() || [];
    if (voices.length === 0) return null;

    const zh = voices.find(v =>
      (v.lang && v.lang.toLowerCase().startsWith("zh")) ||
      (v.name && /chinese|mandarin|zh/i.test(v.name))
    );

    return zh || voices[0];
  }

  function speakChinese(text) {
    if (!("speechSynthesis" in window)) {
      alert("이 브라우저는 음성 기능을 지원하지 않아 ㅠㅠ");
      return;
    }
    if (!text || text === "—" || text === "데이터 없음") return;

    window.speechSynthesis.cancel();

    const u = new SpeechSynthesisUtterance(text);
    u.lang = "zh-CN";
    u.rate = 0.9;
    u.pitch = 1.0;

    const v = getPreferredVoice();
    if (v) u.voice = v;

    window.speechSynthesis.speak(u);
  }

  function speakCurrent() {
    if (cards.length === 0) return;
    speakChinese(cards[idx].hanzi);
  }

  async function loadFromCsv({ keepIndex = true } = {}) {
    const oldHanzi = (cards[idx] && cards[idx].hanzi) ? cards[idx].hanzi : null;

    try {
      render("CSV 로드 중… · ");
      const res = await fetch(`${DEFAULT_CSV_FILE}?v=${Date.now()}`, { cache: "no-store" });
      if (!res.ok) throw new Error(`fetch failed: ${res.status}`);

      const text = await res.text();
      const parsed = parseLines(text);

      if (parsed.length === 0) {
        cards = [];
        idx = 0;
        render("CSV 파싱 실패 · ");
        return;
      }

      cards = parsed;

      if (keepIndex && oldHanzi) {
        const found = cards.findIndex(x => x.hanzi === oldHanzi);
        idx = found >= 0 ? found : Math.min(idx, cards.length - 1);
      } else {
        idx = 0;
      }

      render("CSV · ");
      saveUI();
    } catch (e) {
      console.warn("CSV load 실패:", e);
      cards = [];
      idx = 0;
      render("CSV 불러오기 실패 · ");
    }
  }

  $("next").addEventListener("click", next);
  $("prev").addEventListener("click", prev);
  $("random").addEventListener("click", randomPick);
  $("speak").addEventListener("click", speakCurrent);

  $("card").addEventListener("click", (e) => {
    if (e.target.tagName === "BUTTON") return;
    speakCurrent();
  });

  $("load").addEventListener("click", () => {
    const text = $("input").value.trim();
    const parsed = parseLines(text);

    if (parsed.length === 0) {
      alert("형식이 안 맞아! 최소 (한자,병음,한국어) 또는 (한자 병음 한국어) 형태여야 해.");
      return;
    }

    cards = parsed;
    idx = 0;
    render("입력 · ");
    saveUI();
  });

  $("reloadCsv").addEventListener("click", () => {
    loadFromCsv({ keepIndex: true });
  });

  $("clear").addEventListener("click", () => {
    if (!confirm("입력칸 저장도 같이 지울까?")) return;

    cards = [];
    idx = 0;

    localStorage.removeItem(INPUT_KEY);
    localStorage.removeItem(UI_KEY);

    $("input").value = "";
    render();
    loadFromCsv({ keepIndex:false });
  });

  $("input").addEventListener("input", () => {
    localStorage.setItem(INPUT_KEY, $("input").value);
  });

  window.addEventListener("keydown", (e) => {
    if (e.target && (e.target.tagName === "TEXTAREA" || e.target.tagName === "INPUT")) return;

    if (e.key === "ArrowRight") next();
    if (e.key === "ArrowLeft") prev();
    if (e.key.toLowerCase() === "r") randomPick();
    if (e.key.toLowerCase() === "s") speakCurrent();
  });

  loadSavedUI();
  render();
  loadFromCsv({ keepIndex: true });
</script>
</body>
</html>
