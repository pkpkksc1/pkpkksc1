<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>중국어 단어 카드</title>

<style>

:root{
  --bg:#4a6fb5;
  --card:#ffffff;
  --text:#111827;
  --muted:#6b7280;
  --shadow:0 12px 32px rgba(0,0,0,.12);
  --radius:26px;
  --accent:#ef4444;
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,"Noto Sans KR",sans-serif;
  background:var(--bg);
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:24px;
}

.app{
  width:min(900px,100%);
  display:grid;
  gap:18px;
}

.card{
  background:var(--card);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
  padding:40px;
  display:grid;
  gap:20px;
}

.posLine{
  text-align:center;
  font-size:14px;
  font-weight:700;
  color:var(--muted);
}

.hanzi{
  text-align:center;
  font-size:96px;
  font-weight:900;
}

.row{
  display:flex;
  gap:14px;
  justify-content:center;
  flex-wrap:wrap;
}

.pill{
  border-radius:18px;
  border:2px solid var(--accent);
  padding:16px;
  min-width:260px;
}

.label{
  font-size:12px;
  font-weight:800;
  color:var(--muted);
  margin-bottom:4px;
}

.pinyin{
  font-size:20px;
  font-weight:800;
}

.korean{
  font-size:20px;
  font-weight:900;
}

/* ⭐ 예문 크게 */
.exampleText{
  font-size:28px;
  font-weight:800;
  line-height:2;
}

/* ⭐ 예문 박스 크게 */
#exampleWrap{
  padding:28px;
}

.controls{
  display:flex;
  gap:10px;
  justify-content:center;
}

button{
  border:none;
  border-radius:14px;
  padding:12px 16px;
  font-weight:900;
  cursor:pointer;
}

.primary{background:#111827;color:white}
.secondary{background:#e5e7eb}

</style>
</head>

<body>

<div class="app">

<div class="controls">
<button class="secondary" id="prev">이전</button>
<button class="primary" id="next">다음</button>
</div>

<div class="card">

<div class="posLine" id="pos"></div>

<div class="hanzi" id="hanzi">—</div>

<div class="row">

<div class="pill">
<div class="label">병음</div>
<div class="pinyin" id="pinyin">—</div>
</div>

<div class="pill">
<div class="label">한국어</div>
<div class="korean" id="korean">—</div>
</div>

</div>

<div class="pill" id="exampleWrap">

<div class="label">예문</div>

<div class="exampleText" id="example">—</div>

</div>

</div>

</div>

<script>

const data = [
{hanzi:"条件",pinyin:"tiáojiàn",korean:"조건/환경",pos:"명사",example:"最近我常常跟朋友讨论条件这个话题。"},
{hanzi:"复习",pinyin:"fùxí",korean:"복습하다",pos:"동사",example:"为了提高汉语水平，我每天晚上都会复习。"},
{hanzi:"努力",pinyin:"nǔlì",korean:"노력하다",pos:"동사",example:"只要努力学习，汉语水平一定会提高。"}
]

let i=0

function render(){
const c=data[i]

document.getElementById("hanzi").textContent=c.hanzi
document.getElementById("pinyin").textContent=c.pinyin
document.getElementById("korean").textContent=c.korean
document.getElementById("example").textContent=c.example
document.getElementById("pos").textContent=c.pos
}

document.getElementById("next").onclick=()=>{
i=(i+1)%data.length
render()
}

document.getElementById("prev").onclick=()=>{
i=(i-1+data.length)%data.length
render()
}

render()

</script>

</body>
</html>
