<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>중국어 단어장 카드</title>
  <style>
    :root{
      --bg:#f3f4f6;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --shadow: 0 12px 32px rgba(0,0,0,.12);
      --radius: 26px;

      --accent:#ef4444;

      --btn:#111827;
      --btnText:#ffffff;
      --btn2:#e5e7eb;
      --btn2Text:#111827;
      --danger:#ef4444;
    }
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      background:var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .app{ width:min(1040px, 100%); display:grid; gap:16px; }
    .topbar{
      display:flex; align-items:flex-start; justify-content:space-between;
      gap:12px; flex-wrap:wrap;
    }
    .title{ font-size:18px; font-weight:900; }
    .meta{ color:var(--muted); font-size:13px; }

    .rightBox{
      display:flex;
      flex-direction:column;
      gap:10px;
      align-items:flex-end;
      min-width: 300px;
    }

    .controls{
      display:flex; gap:10px; justify-content:center; flex-wrap:wrap;
    }
    button{
      border:0; border-radius:14px;
      padding:12px 16px;          /* ✅ 전체 버튼 키움 */
      font-weight:900;
      cursor:pointer;
      user-select:none;
    }
    .primary{ background:var(--btn); color:var(--btnText); }
    .secondary{ background:var(--btn2); color:var(--btn2Text); }
    .danger{ background:var(--danger); color:white; }

    /* ✅ 이전/다음 버튼 더 크게 */
    .navBig{
      padding:14px 20px;
      border-radius:16px;
      font-size:16px;
      letter-spacing:.2px;
    }

    .ttsBar{
      display:flex;
      gap:10px;
      align-items:center;
      justify-content:flex-end;
      flex-wrap:wrap;
      color:var(--muted);
      font-size:12px;
      font-weight:800;
    }
    .ttsBar input[type="range"]{
      width:160px;
      accent-color: var(--accent);
    }
    .pillMini{
      background:#fff;
      border:1px solid rgba(0,0,0,.08);
      border-radius:999px;
      padding:6px 10px;
      box-shadow: 0 6px 18px rgba(0,0,0,.06);
    }

    .card{
      background:var(--card);
      border-radius:var(--radius);
      box-shadow:var(--shadow);
      padding:34px;
      display:grid;
      gap:18px;
      position:relative;
      overflow:hidden;
    }
    .posLine{
      text-align:center;
      color:var(--muted);
      font-size:13px;
      font-weight:800;
      margin-top:-6px;
    }
    .hanzi{
      font-size:92px;
      line-height:1;
      text-align:center;
      font-weight:900;
      letter-spacing:1px;
      padding:6px 10px;
    }

    .row{
      display:flex;
      gap:12px;
      justify-content:center;
      align-items:stretch;
      flex-wrap:wrap;
      padding-top:4px;
    }

    .pill{
      border-radius:16px;
      padding:12px 16px;
      background:#fff;
      border:2px solid var(--accent);
      min-width: 240px;
      max-width: 100%;
    }
    .label{
      font-size:12px;
      color:var(--muted);
      margin-bottom:4px;
      font-weight:900;
      letter-spacing:.2px;
    }

    .pinyin{
      font-style: normal;
      color: var(--muted);
      font-size: 18px;
      font-weight: 800;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, "Noto Sans KR", "Apple SD Gothic Neo", sans-serif;
      letter-spacing: .2px;
    }
    .korean{ font-size:18px; font-weight:900; }

    .hiddenText{
      filter: blur(9px);
      user-select:none;
    }

    .panel{
      background:rgba(255,255,255,.70);
      border:1px solid rgba(0,0,0,.06);
      border-radius:18px;
      padding:14px;
      box-shadow: 0 8px 24px rgba(0,0,0,.06);
    }
    textarea{
      width:100%;
      min-height:170px;
      border-radius:14px;
      border:1px solid #e5e7eb;
      padding:12px;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", monospace;
      font-size:13px;
      resize:vertical;
      outline:none;
      background:white;
    }
    .panelRow{
      display:flex; gap:10px; flex-wrap:wrap;
      align-items:center; justify-content:space-between;
      margin-bottom:10px;
    }
    .hint{
      color:var(--muted);
      font-size:13px;
      margin-top:8px;
      line-height:1.5;
    }
    .kbd{
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, monospace;
      background:#111827;
      color:white;
      border-radius:8px;
      padding:2px 7px;
      font-size:12px;
    }
    .footerHint{ text-align:center; color:var(--muted); font-size:12px; }

    @media (max-width:720px){
      .rightBox{ align-items:flex-start; min-width:unset; width:100%; }
      .ttsBar{ justify-content:flex-start; }
    }
    @media (max-width:560px){
      .hanzi{ font-size:76px; }
      .pill{ min-width: 100%; }
      .ttsBar input[type="range"]{ width: 190px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <div class="topbar">
      <div>
        <div class="title">중국어 단어장 카드</div>
        <div class="meta" id="meta"></div>
      </div>

      <div class="rightBox">
        <div class="controls">
          <button class="secondary" id="toggleHide">뜻 가리기</button>
          <button class="secondary" id="speak">🔊 듣기</button>
          <button class="secondary" id="random">랜덤</button>
          <button class="secondary navBig" id="prev">이전</button>
          <button class="primary  navBig" id="next">다음</button>
        </div>

        <div class="ttsBar">
          <span class="pillMini">속도</span>
          <input type="range" id="rate" min="0.6" max="1.2" step="0.05" value="0.9" />
          <span class="pillMini" id="rateLabel">0.90×</span>
          <span class="pillMini" id="voiceLabel">voice: auto</span>
        </div>
      </div>
    </div>

    <div class="card" aria-live="polite" id="card">
      <div class="posLine" id="pos"> </div>
      <div class="hanzi" id="hanzi">—</div>
      <div class="row">
        <div class="pill">
          <div class="label">병음</div>
          <div class="pinyin" id="pinyin">—</div>
        </div>
        <div class="pill">
          <div class="label">한국어</div>
          <div class="korean" id="korean">—</div>
        </div>
      </div>
    </div>

    <div class="panel">
      <div class="panelRow">
        <div style="font-weight:900;">데이터 붙여넣기</div>
        <div class="controls">
          <button class="secondary" id="reloadCsv">📥 CSV 새로고침</button>
          <button class="primary" id="load">불러오기</button>
          <button class="danger" id="clear">초기화</button>
        </div>
      </div>

      <textarea id="input" placeholder="쉼표(CSV) 또는 원래 공백 형식 그대로 붙여넣어도 돼!
예)
地铁,dìtiě,지하철/전철,명사
挤,jǐ,붐비다,형용사/동사"></textarea>

      <div class="hint">
        지원 형식<br/>
        1) <b>한자,병음,한국어,품사(선택)</b> (쉼표 구분)<br/>
        2) <b>한자 병음 한국어 품사</b> (공백 구분)<br/>
        단축키:
        <span class="kbd">←</span> 이전 /
        <span class="kbd">→</span> 다음 /
        <span class="kbd">R</span> 랜덤 /
        <span class="kbd">H</span> 뜻 가리기 /
        <span class="kbd">S</span> 듣기
      </div>
    </div>

    <div class="footerHint">※ 입력칸/설정은 이 브라우저에 자동 저장돼. (localStorage)</div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);

  // ✅ cards는 기본적으로 vocab.csv 기준으로 로드
  // localStorage에는 "입력칸/설정"만 저장 (CSV 업데이트가 즉시 반영되게)
  const INPUT_KEY   = "vocab_cards_input_v2";
  const TTS_KEY     = "vocab_cards_tts_v2";
  const UI_KEY      = "vocab_cards_ui_v2";

  const DEFAULT_CSV_FILE = "vocab.csv";

  let cards = [];
  let idx = 0;
  let hideMeaning = false;

  let ttsRate = 0.9;
  let chosenVoiceName = "auto";

  function parseLines(text) {
    const lines = text.split(/\r?\n/).map(l => l.trim()).filter(Boolean);
    const parsed = [];

    for (const line of lines) {
      if (line.includes(",")) {
        const parts = line.split(",").map(s => s.trim());
        if (parts.length < 3) continue;
        const [hanzi, pinyin, korean, pos] = parts;
        parsed.push({ hanzi, pinyin, korean, pos: pos || "" });
        continue;
      }

      const tokens = line.split(/\s+/);
      if (tokens.length < 3) continue;

      // 공백형: 한자 [병음...] [한국어...] [품사(선택)]
      // 품사 없을 수도 있으니 유연하게 처리
      const hanzi = tokens[0];

      let firstKoIdx = -1;
      for (let i = 1; i < tokens.length; i++) {
        if (/[가-힣]/.test(tokens[i])) { firstKoIdx = i; break; }
      }
      if (firstKoIdx === -1) continue;

      const maybePos = tokens[tokens.length - 1];
      const hasPos = /명사|동사|형용사|부사|대명사|수사|조사|관형사|감탄사|구어|표현/i.test(maybePos);

      const pinyin = tokens.slice(1, firstKoIdx).join(" ");
      const korean = tokens.slice(firstKoIdx, hasPos ? tokens.length - 1 : tokens.length).join(" ");
      const pos = hasPos ? maybePos : "";

      parsed.push({ hanzi, pinyin, korean, pos });
    }

    return parsed;
  }

  function saveUI() {
    localStorage.setItem(INPUT_KEY, $("input").value);
    localStorage.setItem(TTS_KEY, JSON.stringify({ ttsRate, chosenVoiceName }));
    localStorage.setItem(UI_KEY, JSON.stringify({ idx, hideMeaning }));
  }

  function loadSavedUI() {
    const savedText = localStorage.getItem(INPUT_KEY);
    if (savedText !== null) $("input").value = savedText;

    const savedTTS = localStorage.getItem(TTS_KEY);
    if (savedTTS) {
      try{
        const t = JSON.parse(savedTTS);
        if (typeof t.ttsRate === "number") ttsRate = t.ttsRate;
        if (typeof t.chosenVoiceName === "string") chosenVoiceName = t.chosenVoiceName;
      }catch(e){}
    }

    const savedUI = localStorage.getItem(UI_KEY);
    if (savedUI) {
      try{
        const u = JSON.parse(savedUI);
        if (Number.isFinite(u.idx)) idx = u.idx;
        if (typeof u.hideMeaning === "boolean") hideMeaning = u.hideMeaning;
      }catch(e){}
    }
  }

  function clampIndex() {
    if (cards.length === 0) { idx = 0; return; }
    if (idx < 0) idx = 0;
    if (idx >= cards.length) idx = cards.length - 1;
  }

  function render(metaPrefix = "") {
    clampIndex();

    if (cards.length === 0) {
      $("hanzi").textContent = "데이터 없음";
      $("pinyin").textContent = "—";
      $("korean").textContent = "—";
      $("pos").textContent = "";
      $("meta").textContent = metaPrefix || "vocab.csv 자동 로드 중… 또는 아래에 데이터를 넣고 ‘불러오기’를 눌러줘!";
      return;
    }

    const c = cards[idx];
    $("hanzi").textContent = c.hanzi || "—";
    $("pinyin").textContent = c.pinyin || "—";
    $("pos").textContent = c.pos ? c.pos : "";

    const ko = $("korean");
    ko.textContent = c.korean || "—";
    ko.classList.toggle("hiddenText", hideMeaning);

    $("meta").textContent = `${metaPrefix}${idx + 1} / ${cards.length}` + (c.pos ? ` · ${c.pos}` : "");
  }

  function next() {
    if (cards.length === 0) return;
    idx = (idx + 1) % cards.length;
    render();
    saveUI();
  }
  function prev() {
    if (cards.length === 0) return;
    idx = (idx - 1 + cards.length) % cards.length;
    render();
    saveUI();
  }
  function randomPick() {
    if (cards.length === 0) return;
    if (cards.length === 1) { idx = 0; render(); saveUI(); return; }
    let r;
    do { r = Math.floor(Math.random() * cards.length); } while (r === idx);
    idx = r;
    render();
    saveUI();
  }

  function getPreferredVoice() {
    if (!("speechSynthesis" in window)) return null;
    const voices = window.speechSynthesis.getVoices() || [];
    if (voices.length === 0) return null;

    if (chosenVoiceName && chosenVoiceName !== "auto") {
      const exact = voices.find(v => v.name === chosenVoiceName);
      if (exact) return exact;
    }

    const zh = voices.find(v =>
      (v.lang && v.lang.toLowerCase().startsWith("zh")) ||
      (v.name && /chinese|mandarin|zh/i.test(v.name))
    );
    return zh || voices[0];
  }

  function refreshVoiceLabel() {
    const v = getPreferredVoice();
    $("voiceLabel").textContent = v ? `voice: ${v.lang || "?"}` : "voice: loading...";
  }

  function speakChinese(text) {
    if (!("speechSynthesis" in window)) {
      alert("이 브라우저는 음성 기능을 지원하지 않아 ㅠㅠ");
      return;
    }
    if (!text || text === "—" || text === "데이터 없음") return;

    window.speechSynthesis.cancel();

    const u = new SpeechSynthesisUtterance(text);
    u.lang = "zh-CN";
    u.rate = ttsRate;
    u.pitch = 1.0;

    const v = getPreferredVoice();
    if (v) u.voice = v;

    window.speechSynthesis.speak(u);
  }

  function speakCurrent() {
    if (cards.length === 0) return;
    speakChinese(cards[idx].hanzi);
  }

  // ✅ 핵심: vocab.csv는 새로고침하면 항상 최신으로 다시 읽는다
  async function loadFromCsv({ keepIndex = true } = {}) {
    const oldHanzi = (cards[idx] && cards[idx].hanzi) ? cards[idx].hanzi : null;

    try{
      render("CSV 로드 중… · ");
      const res = await fetch(`${DEFAULT_CSV_FILE}?v=${Date.now()}`); // 캐시 방지
      if (!res.ok) throw new Error("fetch failed");

      const text = await res.text();
      const parsed = parseLines(text);

      if (parsed.length === 0) {
        cards = [];
        idx = 0;
        render("CSV 파싱 실패 · ");
        return;
      }

      cards = parsed;

      if (keepIndex && oldHanzi) {
        const found = cards.findIndex(x => x.hanzi === oldHanzi);
        idx = found >= 0 ? found : Math.min(idx, cards.length - 1);
      } else {
        idx = 0;
      }

      render("CSV · ");
      saveUI();
    }catch(e){
      console.warn("CSV load 실패:", e);
      cards = [];
      idx = 0;
      render("CSV 불러오기 실패 · ");
    }
  }

  // UI events
  $("next").addEventListener("click", next);
  $("prev").addEventListener("click", prev);
  $("random").addEventListener("click", randomPick);

  $("toggleHide").addEventListener("click", () => {
    hideMeaning = !hideMeaning;
    $("toggleHide").textContent = hideMeaning ? "뜻 보이기" : "뜻 가리기";
    render("CSV · ");
    saveUI();
  });

  $("speak").addEventListener("click", () => speakCurrent());
  $("card").addEventListener("click", () => speakCurrent());

  const rateEl = $("rate");
  const rateLabel = $("rateLabel");
  function setRate(val) {
    ttsRate = Number(val);
    rateEl.value = String(ttsRate);
    rateLabel.textContent = `${ttsRate.toFixed(2)}×`;
    saveUI();
  }
  rateEl.addEventListener("input", (e) => setRate(e.target.value));

  // 입력칸 기반 "불러오기" (사용자가 붙여넣은 걸로 덮어쓰기)
  $("load").addEventListener("click", () => {
    const text = $("input").value.trim();
    const parsed = parseLines(text);
    if (parsed.length === 0) {
      alert("형식이 안 맞아! 최소 (한자,병음,한국어) 또는 (한자 병음 한국어) 형태여야 해.");
      return;
    }
    cards = parsed;
    idx = 0;
    render("입력 · ");
    saveUI();
  });

  // ✅ CSV 새로고침 버튼
  $("reloadCsv").addEventListener("click", () => {
    loadFromCsv({ keepIndex: true });
  });

  // 초기화: 입력/설정만 지우고 CSV 다시 로드
  $("clear").addEventListener("click", () => {
    if (!confirm("입력칸/설정 저장도 같이 지울까?")) return;
    cards = [];
    idx = 0;
    hideMeaning = false;

    localStorage.removeItem(INPUT_KEY);
    localStorage.removeItem(TTS_KEY);
    localStorage.removeItem(UI_KEY);

    $("input").value = "";
    $("toggleHide").textContent = "뜻 가리기";
    chosenVoiceName = "auto";
    setRate(0.9);

    render();
    refreshVoiceLabel();
    loadFromCsv({ keepIndex:false });
  });

  $("input").addEventListener("input", () => {
    localStorage.setItem(INPUT_KEY, $("input").value);
  });

  window.addEventListener("keydown", (e) => {
    if (e.target && (e.target.tagName === "TEXTAREA" || e.target.tagName === "INPUT")) return;
    if (e.key === "ArrowRight") next();
    if (e.key === "ArrowLeft") prev();
    if (e.key.toLowerCase() === "r") randomPick();
    if (e.key.toLowerCase() === "h") $("toggleHide").click();
    if (e.key.toLowerCase() === "s") speakCurrent();
  });

  if ("speechSynthesis" in window) {
    window.speechSynthesis.onvoiceschanged = () => refreshVoiceLabel();
  }

  // init
  loadSavedUI();
  $("toggleHide").textContent = hideMeaning ? "뜻 보이기" : "뜻 가리기";
  setRate(ttsRate);
  render();

  setTimeout(refreshVoiceLabel, 250);
  setTimeout(refreshVoiceLabel, 1000);

  // ✅ 시작하자마자 vocab.csv 최신 로드 (항상)
  loadFromCsv({ keepIndex: true });
</script>
</body>
</html>
